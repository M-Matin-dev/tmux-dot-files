source-file ~/.config/tmux/tmux.reset.conf

# Terminal: prefer tmux-256color, fall back to screen-256color
set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'


set -g prefix ^F
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g pane-base-index 1         # start indexing panes at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on       # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
set -g display-panes-time 2000   # show pane numbers for 2s (default 1s)
set -g status-position top
setw -g mode-keys vi

# ── Clipboard (macOS / Linux / WSL) ─────────────────────────────────────────
# set-clipboard on (above) enables OSC52 passthrough — tmux forwards yanked
# text to the terminal emulator (alacritty) via escape sequences, so no
# external clipboard tool is needed in headless environments like containers.
# We only override with native tools when a display is actually available.
if-shell 'uname | grep -q Darwin' {
  # macOS — pbcopy / pbpaste
  set -g @override_copy_command 'pbcopy'
} {
  if-shell '[ -n "$WSL_DISTRO_NAME" ] || grep -qi microsoft /proc/version 2>/dev/null' {
    # WSL — forward to Windows clipboard via clip.exe
    set -g @override_copy_command 'clip.exe'
    bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'clip.exe'
    bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'clip.exe'
  } {
    # Native Linux — only use xclip/xsel when a display is present (not in
    # headless containers). Without $DISPLAY, rely on OSC52 via set-clipboard.
    if-shell '[ -n "$DISPLAY" ] && command -v xclip > /dev/null' {
      set -g @override_copy_command 'xclip -selection clipboard -in'
      bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
      bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xclip -selection clipboard -in'
    } {
      if-shell '[ -n "$DISPLAY" ] && command -v xsel > /dev/null' {
        set -g @override_copy_command 'xsel --clipboard --input'
        bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'xsel --clipboard --input'
        bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel 'xsel --clipboard --input'
      }
    }
  }
}
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key T
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'omerxx/catppuccin-tmux' # My fork that holds the meetings script bc I'm lazy af
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @sessionx-bind-zo-new-window 'ctrl-y'
set -g @sessionx-auto-accept 'off'
set -g @sessionx-custom-paths '$HOME/.config'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '$HOME/.config'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '75%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-dir '~/.local/share/tmux/resurrect'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory" # date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
# set -g @catppuccin_meetings_text "#($HOME/.config/tmux/scripts/cal.sh)"
# set -g @catppuccin_date_time_text "%H:%M"

bind -N "Show prefix key bindings" ? display-popup -E -w 80% -h 70% \
  -T " prefix keys " \
  "tmux list-keys -N -T prefix | sed 's/^bind-key[[:space:]]*//' | column -t -s $'\\t' | less -R"

bind -N "Show copy-mode-vi keys" C-? display-popup -E -w 80% -h 70% \
  -T " copy-mode-vi keys " \
  "tmux list-keys -N -T copy-mode-vi | sed 's/^bind-key[[:space:]]*//' | column -t -s $'\\t' | less -R"

# ── Vi copy-mode bindings (nvim-style) ──────────────────────────────────────
# Enter copy-mode with prefix+[ (default) or Escape from normal mode.
# mode-keys vi (set above) already gives: hjkl, /,?,n,N, 0,$, w,b,e, q to quit

# Selection — mirror nvim visual modes
bind -T copy-mode-vi v     send -X begin-selection          # visual char (like nvim v)
bind -T copy-mode-vi V     send -X select-line              # visual line (like nvim V)
bind -T copy-mode-vi C-v   send -X rectangle-toggle         # visual block (like nvim C-v)

# Scrolling — mirror nvim C-u / C-d / C-f / C-b
bind -T copy-mode-vi C-u   send -X halfpage-up
bind -T copy-mode-vi C-d   send -X halfpage-down
bind -T copy-mode-vi C-f   send -X page-down
bind -T copy-mode-vi C-b   send -X page-up

# Jump to top/bottom — mirror nvim gg / G
bind -T copy-mode-vi g     send -X top-line
bind -T copy-mode-vi G     send -X bottom-line

# Escape cancels selection (like nvim)
bind -T copy-mode-vi Escape send -X cancel

run '~/.config/tmux/plugins/tpm/tpm'

# Enable focus events so Neovim receives FocusLost/FocusGained
set -g focus-events on

# Harmonized Catppuccin Mocha styling
# window-style/window-active-style: inactive vs active pane backgrounds.
# Include `dim` so even ANSI-colored text (eg. Oh-My-Zsh prompt colors) is subdued.
# (pane-style/pane-active-style are not valid in tmux 3.x — window-* is the replacement)
set -g window-style        'fg=#6c7086,bg=#181825,dim'
set -g window-active-style 'fg=#cdd6f4,bg=#1e1e2e,nodim'
